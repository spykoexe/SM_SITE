services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: sm-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: sm-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: UPLOAD_MAX_SIZE
        value: "10485760"
      - key: UPLOAD_DIR
        value: uploads

  # ── Frontend Static Site ──────────────────────────────────
  - type: web
    name: sm-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Redis ─────────────────────────────────────────────────
  - type: redis
    name: sm-redis
    plan: free
    ipAllowList: []

databases:
  # ── PostgreSQL ────────────────────────────────────────────
  - name: sm-postgres
    plan: free
